<div class="dashboard">

  <!-- Sidebar -->
  <div class="sidebar">

    <div class="sidebar-logo">
      <h2>🌸 BloomPro</h2>
      <span>Admin Panel</span>
    </div>

    <nav class="sidebar-nav">
      <a routerLink="/admin">🏠 Dashboard</a>
      <a routerLink="/certification-form">📄 Create Certificate</a>
      <a routerLink="/certifications">📋 Certificates</a>
      <a routerLink="/members">👥 Members</a>
      <a routerLink="/statistics">📊 Statistics</a>
      <a routerLink="/profile">👤 Profile</a>
    </nav>

    <div class="sidebar-footer">
      <button class="logout-btn" (click)="logout()">🚪 Logout</button>
    </div>

  </div>

  <!-- Main -->
  <div class="main">

    <div class="page-header">
      <h1>Admin Dashboard</h1>
      <p>Welcome back, Administrator 👋</p>
    </div>

    <div class="cards">

      <div class="card" routerLink="/certification-form">
        <span class="card-icon">📄</span>
        <h2>Create Certificate</h2>
        <button class="card-btn">Open</button>
      </div>

      <div class="card" routerLink="/certifications">
        <span class="card-icon">📋</span>
        <h2>View Certificates</h2>
        <button class="card-btn">Open</button>
      </div>

      <div class="card" routerLink="/members">
        <span class="card-icon">👥</span>
        <h2>Members</h2>
        <button class="card-btn">Open</button>
      </div>

      <div class="card" routerLink="/statistics">
        <span class="card-icon">📊</span>
        <h2>Statistics</h2>
        <button class="card-btn">Open</button>
      </div>

    </div>

  </div>

</div>
