<div class="page-wrapper">

  <div class="page-header">
    <h1>📊 Statistics</h1>
  </div>

  <div class="stat-cards">
    <div class="stat-card">
      <span class="stat-icon">👥</span>
      <div class="stat-value">{{ totalMembers }}</div>
      <div class="stat-label">Total Members</div>
    </div>
    <div class="stat-card">
      <span class="stat-icon">✅</span>
      <div class="stat-value">{{ certifiedMembers }}</div>
      <div class="stat-label">Certified Members</div>
    </div>
    <div class="stat-card">
      <span class="stat-icon">📄</span>
      <div class="stat-value">{{ totalCertificates }}</div>
      <div class="stat-label">Total Certificates</div>
    </div>
    <div class="stat-card">
      <span class="stat-icon">🟢</span>
      <div class="stat-value">{{ activeCertificates }}</div>
      <div class="stat-label">Active</div>
    </div>
    <div class="stat-card">
      <span class="stat-icon">🔴</span>
      <div class="stat-value">{{ expiredCertificates }}</div>
      <div class="stat-label">Expired</div>
    </div>
  </div>

  <div class="charts-grid">
    <div class="chart-card">
      <h3>Certificates by Status</h3>
      <canvas id="statusChart"></canvas>
    </div>
    <div class="chart-card">
      <h3>Certificates by Type</h3>
      <canvas id="typeChart"></canvas>
    </div>
  </div>

</div>
