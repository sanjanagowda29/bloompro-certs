<div class="page-wrapper">
  <div class="form-card">

    <h1>{{ editingId ? '✏️ Edit Certificate' : '📄 New Certificate' }}</h1>

    <div class="form-grid">

      <div class="form-group">
        <label>Member ID</label>
        <input type="text" [(ngModel)]="certificate.memberId" placeholder="e.g. M001">
      </div>

      <div class="form-group">
        <label>Member Name</label>
        <input type="text" [(ngModel)]="certificate.memberName" placeholder="Full name">
      </div>

      <div class="form-group full">
        <label>Certification Name</label>
        <input type="text" [(ngModel)]="certificate.certificationName" placeholder="e.g. Orchid Judging Level 1">
      </div>

      <div class="form-group full">
        <label>Issuer</label>
        <input type="text" [(ngModel)]="certificate.issuer" placeholder="e.g. American Orchid Society">
      </div>

      <div class="form-group">
        <label>Issue Date</label>
        <input type="date" [(ngModel)]="certificate.issueDate">
      </div>

      <div class="form-group">
        <label>Expiry Date</label>
        <input type="date" [(ngModel)]="certificate.expiryDate">
      </div>

      <div class="form-group full">
        <label>Document URL (optional)</label>
        <input type="text" [(ngModel)]="certificate.documentUrl" placeholder="Paste Google Drive or Dropbox PDF link">
        <a *ngIf="certificate.documentUrl" class="doc-link" [href]="certificate.documentUrl" target="_blank">
          📎 View existing document
        </a>
      </div>

    </div>

    <div class="form-actions">
      <button class="btn-back" (click)="router.navigate(['/certifications'])">← Back</button>
      <button class="btn-save" (click)="saveCertificate()" [disabled]="saving">
        {{ saving ? 'Saving...' : (editingId ? 'Update Certificate' : 'Create Certificate') }}
      </button>
    </div>

  </div>
</div>
