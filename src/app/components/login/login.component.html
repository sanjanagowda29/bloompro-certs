<div class="login-page">

  <!-- Brand Side -->
  <div class="login-brand">
    <div class="brand-icon">🌸</div>
    <h1>BloomPro Certs</h1>
    <p>Orchid Grower Certification & Training Management for modern societies</p>
  </div>

  <!-- Form Side -->
  <div class="login-form-side">
    <div class="login-card">

      <h2>Welcome back</h2>
      <p class="subtitle">Sign in to your account to continue</p>

      <div class="form-group">
        <label>Email Address</label>
        <div class="input-wrapper">
          <span class="input-icon">✉️</span>
          <input type="email" placeholder="you@example.com" [(ngModel)]="email">
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-wrapper">
          <span class="input-icon">🔒</span>
          <input type="password" placeholder="Enter your password" [(ngModel)]="password">
        </div>
      </div>

      <button class="login-btn" (click)="login()">
        Sign In →
      </button>

    </div>
  </div>

</div>
